name: Dependency Review

on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    if: ${{ vars.ENABLE_DEPENDENCY_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  dependency-review-skipped:
    if: ${{ vars.ENABLE_DEPENDENCY_REVIEW != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip dependency review
        run: |
          echo "Dependency Review pulado."
          echo "Defina ENABLE_DEPENDENCY_REVIEW=true nas variaveis do reposit\u00f3rio quando o recurso estiver habilitado no GitHub."
