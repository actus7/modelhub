services:
  modelhub:
    build:
      context: /opt/modelhub
      dockerfile: Dockerfile
    container_name: modelhub-instance
    expose:
      - 3000
    env_file:
      - /opt/modelhub/.env
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://localhost:3000/health]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - modelhub-network
    volumes:
      - modelhub-logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: modelhub-nginx
    ports:
      - 4443:443
    volumes:
      - /opt/modelhub/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/modelhub/nginx/selfsigned.crt:/etc/nginx/certs/selfsigned.crt:ro
      - /opt/modelhub/nginx/selfsigned.key:/etc/nginx/certs/selfsigned.key:ro
    depends_on:
      - modelhub
    restart: unless-stopped
    networks:
      - modelhub-network

networks:
  modelhub-network:
    driver: bridge

volumes:
  modelhub-logs:
    driver: local
